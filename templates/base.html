{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="csrf-token" content="{{ csrf_token }}">
        <link rel="icon" type="image/x-icon" href="{% static 'images/logo.png' %}">
        <link href="{% static 'css/custom.css' %}" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="{% static 'css/styles.css' %}">
        <title>{% block title%}{% endblock %}</title>
    </head>
    <body id="body" class="h-100" data-bs-theme="light" dir="rtl">
        {% block content %}
        {% endblock %}

        {% if user.is_authenticated %}
            {% comment %} Support Modal {% endcomment %}
            <button class="btn btn-primary rounded-circle shadow-lg d-flex align-items-center justify-content-center"
            data-bs-toggle="modal"
            data-bs-target="#supportModal"
            data-submit-url="{% url 'apps.students:submit_ticket' %}"
            style="position: fixed; bottom: 1.5rem; left: 1.5rem; width: 56px; height: 56px; z-index: 1050;">
                <i class="bi bi-headset fs-4"></i>
            </button>
            <div class="modal fade" id="supportModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold">
                                <i class="bi bi-headset"></i> الدعم والمساعدة
                            </h5>
                            <button type="button" class="btn-close me-auto ms-0" data-bs-dismiss="modal"></button>
                        </div>

                        <!-- form state -->
                        <div id="ticketForm">
                            <div class="modal-body">
                                <div id="ticketError" class="alert alert-danger d-none"></div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">التصنيف</label>
                                    <select name="category" id="ticketCategory" class="form-select" required>
                                        <option value="" disabled selected>اختر التصنيف</option>
                                        <option value="academic">أكاديمي</option>
                                        <option value="financial">مالي</option>
                                        <option value="technical">تقني</option>
                                        <option value="other">أخرى</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">الموضوع</label>
                                    <input type="text" id="ticketSubject" class="form-control" placeholder="موضوع الطلب" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">التفاصيل</label>
                                    <textarea id="ticketBody" class="form-control" rows="4" placeholder="اشرح مشكلتك بالتفصيل..." required></textarea>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" id="ticketSubmit" class="btn btn-primary">
                                    <i class="bi bi-send me-1"></i> إرسال
                                </button>
                            </div>
                        </div>

                        <!-- success state -->
                        <div id="ticketSuccess" class="d-none">
                            <div class="modal-body text-center py-5">
                                <i class="bi bi-check-circle-fill text-success fs-1 d-block mb-3"></i>
                                <h6 class="fw-bold">تم إرسال طلبك بنجاح</h6>
                                <p class="text-muted">سيتم الرد عليك في أقرب وقت.</p>
                            </div>
                            <div class="modal-footer justify-content-center">
                                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">إغلاق</button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        {% endif %}


        {% block script %}
        {% endblock %}
        <script src="{% static '/js/index.js' %}"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    </body>
</html>
