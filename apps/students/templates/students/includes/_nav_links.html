<a href="{% url 'apps.students:dashboard' %}" class="nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-2 text-white mb-1">
    <i class="bi bi-house-fill flex-shrink-0 fs-5"></i>
    <span class="link-label">الصفحة الرئيسية</span>
</a>
<a href="{% url 'apps.students:finance' %}" class="nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-2 text-white mb-1">
    <i class="bi bi-credit-card-fill flex-shrink-0 fs-5"></i>
    <span class="link-label">المالية</span>
</a>
<a href="{% url 'apps.students:course_catalog' %}" class="nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-2 text-white mb-1">
    <i class="bi bi-pencil-fill flex-shrink-0 fs-5"></i>
    <span class="link-label">التسجيل</span>
</a>
<div>
    <button
        class="nav-link text-white d-flex gap-2 rounded px-3 py-2 w-100 border-0 bg-transparent"
        data-bs-toggle="collapse"
        data-bs-target="#submenuCourses"
        aria-expanded="false"
        aria-controls="submenuCourses">
        <i class="bi bi-bar-chart flex-shrink-0 fs-5"></i>
        <span class="link-label flex-grow-1 text-end me-2 my-auto">العلامات</span>
        <i class="bi bi-chevron-down link-label ms-auto my-auto" style="font-size:.75rem; transition: transform .25s;" id="submenuCoursesIcon"></i>
    </button>

    <div class="collapse" id="submenuCourses">
        <div class="d-flex flex-column mt-1 gap-1">
            <a href="{% url 'apps.students:current_grades' %}" class="nav-link text-white d-flex align-items-center gap-2 rounded px-3 py-2">
                <i class="bi bi-journal-text flex-shrink-0" style="font-size:1rem"></i>
                <span class="link-label">علامات الفصل</span>
            </a>
            <a href="{% url 'apps.students:grade_history' %}" class="nav-link text-white d-flex align-items-center gap-2 rounded px-3 py-2">
                <i class="bi bi-clock-history flex-shrink-0" style="font-size:1rem"></i>
                <span class="link-label">كشف العلامات</span>
            </a>
        </div>
    </div>
</div>
<a href="{% url 'apps.students:subject_catalog' %}" class="nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-2 text-white mb-1">
    <i class="bi bi-map-fill flex-shrink-0 fs-5"></i>
    <span class="link-label">الخطة المفرغة</span>
</a>
<a href="{% url 'apps.students:announcements' %}" class="nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-2 text-white mb-1">
    <span class="position-relative flex-shrink-0">
        <i class="bi bi-megaphone-fill fs-5"></i>
        {% if unseen_announcements > 0 %}
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem;">
                {{ unseen_announcements }}
            </span>
        {% endif %}
    </span>
    <span class="link-label">الاعلانات</span>
</a>
<div>
    <button
        class="nav-link text-white d-flex gap-2 rounded px-3 py-2 w-100 border-0 bg-transparent"
        data-bs-toggle="collapse"
        data-bs-target="#services"
        aria-expanded="false"
        aria-controls="submenuCourses">
        <i class="bi bi-grid flex-shrink-0 fs-5"></i>
        <span class="link-label flex-grow-1 text-end me-2 my-auto">الخدمات</span>
        <i class="bi bi-chevron-down link-label ms-auto my-auto" style="font-size:.75rem; transition: transform .25s;" id="submenuCoursesIcon"></i>
    </button>

    <div class="collapse" id="services">
        <div class="d-flex flex-column mt-1 gap-1">
            <a href="{% url 'apps.students:services' %}" class="nav-link text-white d-flex align-items-center gap-2 rounded px-3 py-2">
                <i class="bi bi-box flex-shrink-0" style="font-size:1rem"></i>
                <span class="link-label">خدمات التسجيل</span>
            </a>
            <a href="{% url 'apps.students:tickets_list' %}" class="nav-link text-white d-flex align-items-center gap-2 rounded px-3 py-2">
                <i class="bi bi-headset flex-shrink-0" style="font-size:1rem"></i>
                <span class="link-label">تذاكر الدعم</span>
            </a>
        </div>
    </div>
</div>
<a href="{% url 'apps.students:profile' %}" class="nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-2 text-white mb-1">
    <i class="bi bi-person-circle flex-shrink-0 fs-5"></i>
    <span class="link-label">معلوماتي</span>
</a>
<a href="{% url 'apps.students:logout' %}" class="nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-2 text-white mb-1">
    <i class="bi bi-box-arrow-left flex-shrink-0 fs-5"></i>
    <span class="link-label">خروج</span>
</a>
