{% extends 'base.html' %}
{% block content %}
    {% include 'students/includes/sidebar.html' %}
    <div id="main-content">
        <div class="container-fluid p-3 p-md-4">
            <div class="d-flex align-items-center gap-2 mb-3">
                <!-- Mobile: opens offcanvas -->
                <button class="btn btn-outline-dark d-md-none"
                        data-bs-toggle="offcanvas"
                        data-bs-target="#mobileSidebar"
                        id="mobileSidebarToggle">
                    <i class="bi bi-list fs-5"></i>
                </button>

                <h2 class="mb-0 fw-bold me-md-0 me-2">العلامات الفصلية</h2>
            </div>
            <hr>
            <div class="row justify-content-center mt-5">
                <div class="col-md-6 text-center">
                    <div class="card border-0 shadow-sm p-5">
                        <i class="bi bi-lock fs-1 text-danger mb-3 d-block"></i>
                        <h5 class="fw-bold">باب التسجيل مغلق</h5>
                        <p class="text-muted">لا يوجد فترة تسجيل مفتوحة حالياً، يرجى مراجعة الإدارة.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>  
{% endblock %}
